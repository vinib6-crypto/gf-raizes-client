$8$CUIDADO: Esse item repara sua arma ou armadura sem diminuir a durabilidade. Mas se a durabilidade já estiver reduzida por algum motivo, esse item năo irá restaurar a durabilidade máxima.
$7$DURABILIDADE: Durabilidade é quanto o seu item aguenta antes de quebrar, cada uso ou golpe sofrido o item perde um pouco da durabilidade e ao quebrar ele năo pode ser mais usado ou năo dará nenhuma vantagem se já estiver equipado. A durabilidade é mostrada pelos numeros entre as barras (exemplo 100/110, o item tem 100 de durabilidade sendo que pode chegar até 110)
