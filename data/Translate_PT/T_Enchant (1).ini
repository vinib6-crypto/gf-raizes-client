53764|Marreta Reparadora Simples|$6$Com essa Marreta vocę será capaz de fazer pequenos reparos na sua arma ou armadura.
$7$"Use para vocę mesmo reparar uma peça do equipamento."|||


53765|Marreta Reparadora do Ferreiro|$6$Com essa Marreta vocę será capaz de fazer grandes reparos na sua arma ou armadura. Essa marreta repara seu item 100%, além de restaurar a durabilidade máxima.
$7$DURABILIDADE: Durabilidade é quanto o seu item aguenta antes de quebrar, cada uso ou golpe sofrido o item perde um pouco da durabilidade e ao quebrar ele năo pode ser mais usado ou năo dará nenhuma vantagem se já estiver equipado. A durabilidade é mostrada pelos numeros entre as barras (exemplo 100/110, o item tem 100 de durabilidade sendo que pode chegar até 110)
$7$DURABILIDADE MÁXIMA: Durabilidade máxima é quanto o item tem de durabilidade total. A durabilidade de um item, dependendo de como for reparado, pode ser seu valor reduzido. A durabilidade máxima é o valor entre parenteses (Exemplo: 100/110 (120), esse item tem 100 de durabilidade, pode chegar até 110, mas se for reparado corretamente poderá chegar em 120). A durabilidade máxima só pode ser reparada com a Marreta de Reparo do Artesăo.
$7$"Use para vocę mesmo reparar uma peça do equipamento."|||



