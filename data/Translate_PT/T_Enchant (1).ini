68550|Lido o Relatório de Pesquisa de Jéss,|$7$ "Sobre o estado atual da Alta Erosăo do Cristal Mágico:"
$7$ "Após a segunda prisăo ser quebrada, a situaçăo de infiltraçăo em toda a área é a mesma que foi prevista anteriormente, mas ainda năo é possível entrar na área norte originalmente presa."
$7$ "Quando a força da Erosăo atinge a Falha natural, ela afunda e năo flui para a falha. Atualmente, năo se sabe para onde ela foi. O rastreamento de Energia é interrompido pouco depois da força da Erosăo entrar na falha. A resposta do feedback é que a força da Erosăo vai para um lugar onde năo podemos rastreá-la."
$7$ "Pode ser necessário pesquisar em outras áreas para descobrir para onde a força da Erosăo está indo."
$7$ "Antes de descobrir a situaçăo, eu mudei a direçăo do fluxo de STR do cristal de Erosăo para se espalhar em outras áreas e evitar desperdício desnecessário na regiăo norte."
$12$ "Vocę leu o relatório e o feitiço Silenciado năo pode ser revertido imediatamente. Vocę precisará de um tempo para lidar com isso."
$12$ "* A missăo só pode ser concluída após o término deste estado.|||
68551|Lido o Relatório de Pesquisa de Milian.|$7$ "Investigaçăo sobre Barreira do Norte:"
$7$ "Esta é uma investigaçăo realizada em conjunto com a pesquisa de Jes sobre a situaçăo em Barreira do Norte."
$7$ "Primeiro, confirmamos que Barreira do Norte é altamente exclusiva. Quando a fronteira apareceu, todos os membros que coletavam a energia de aprisionamento no norte desapareceram e nunca mais voltaram. As pessoas que foram enviadas para o norte năo encontraram nenhum sinal deixado pelos membros desaparecidos, nem mesmo o fluxo de STR."
$7$ "Essa situaçăo é muito incomum e a natureza de Barreira do Norte é diferente de tudo o que encontramos antes. Na verdade, suspeito que isso năo seja Barreira."
$7$ "A diferença entre o efeito de isolamento de energia e o efeito de isolamento humano é muito grande. Portanto, as habilidades dos abençoados pelos deuses que foram enviados para o norte foram todas desativadas e a conexăo com os deuses foi cortada."
$7$ "Para continuar esta investigaçăo, precisamos de lutadores mais fortes para explorar."
$12$ "Vocę leu o relatório e năo pode desfazer o feitiço Silenciado. Levará algum tempo para lidar com isso."
$12$ "* A missăo só pode ser concluída após o término deste estado.|||
68552|Lido o Relatório de Pesquisa de Niedel.|$7$ "Relatório de pesquisa sobre o poder de aprisionamento:"
$7$ "Com base nos resultados atuais dos experimentos, é completamente viável liberar completamente todo o poder de aprisionamento restante após a assimilaçăo, e năo haverá nenhuma sequela."
$7$ "No entanto, o poder de aprisionamento tem uma compatibilidade extremamente baixa com pessoas comuns. Além de existęncias como nossos deuses, apenas viajantes que possuem poder temporal e espacial inato e pessoas que tęm uma interaçăo profunda com Sprites podem atrair e transformar o poder de aprisionamento."
$7$ "Para alcançar nosso objetivo, há muito trabalho a ser feito. Além de coletar o poder de aprisionamento, precisamos evitar que viajantes ou pessoas com afinidade com Sprites entrem em contato com o poder de aprisionamento."
$7$ "Caso contrário, antes que nossos deuses obtenham o STR, ele pode ser roubado por esses hereges."
$12$ "Vocę roubou o relatório, o feitiço Silenciado năo pode ser revertido por enquanto, vocę precisará de algum tempo para lidar com isso."
